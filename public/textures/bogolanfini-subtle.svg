<!-- /public/textures/bogolanfini-subtle.svg -->
<svg xmlns="http://www.w3.org/2000/svg" width="100%" height="100%">
  <defs>
    <pattern 
      id="bogolan-pattern" 
      patternUnits="userSpaceOnUse" 
      width="60" 
      height="60"
    >
      <!-- Use a group to set the subtle fill color for all shapes -->
      <g fill="rgba(29, 33, 41, 0.08)">
        <!-- A mix of dots, lines, and chevrons -->
        <circle cx="10" cy="15" r="2.5" />
        <circle cx="45" cy="40" r="2" />
        
        <rect x="25" y="5" width="2" height="12" />
        <rect x="5" y="50" width="15" height="2" />
        
        <polyline points="30,20 35,25 30,30" stroke="rgba(29, 33, 41, 0.08)" stroke-width="2" fill="none" />
        <polyline points="50,5 55,10 50,15" stroke="rgba(29, 33, 41, 0.08)" stroke-width="2" fill="none" />
        
        <circle cx="55" cy="55" r="1.5" />
      </g>
    </pattern>
  </defs>
  <rect width="100%" height="100%" fill="url(#bogolan-pattern)" />
</svg>